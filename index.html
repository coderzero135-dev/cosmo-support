<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cosmo Support</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>&#9678;</text></svg>">
<link rel="manifest" href="manifest.json"><style>
:root {
  --bg: #09090b;
  --bg2: #131316;
  --bg3: #1c1c1f;
  --border: #27272a;
  --border-light: #1f1f23;
  --text: #fafafa;
  --text2: #a1a1aa;
  --text3: #71717a;
  --accent: #3b82f6;
  --accent-hover: #2563eb;
  --green: #22c55e;
  --red: #ef4444;
  --amber: #eab308;
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
  --mono: "SF Mono", "Cascadia Code", Consolas, "Liberation Mono", Menlo, monospace;
  --radius: 8px;
  --radius-sm: 5px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

/* Layout */
.layout { display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; }

/* Sidebar */
.sidebar {
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  position: sticky; top: 0; height: 100vh;
  overflow-y: auto; z-index: 10;
}
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.sidebar-header { padding: 18px 18px 12px; border-bottom: 1px solid var(--border); }
.sb-brand { font-size: 16px; font-weight: 700; letter-spacing: -0.01em; }
.sb-version { font-size: 10px; color: var(--text3); font-family: var(--mono); text-transform: uppercase; margin-top: 2px; }
.sidebar-close { display: none; position: absolute; top: 10px; right: 10px; width: 32px; height: 32px; background: none; border: none; color: var(--text); cursor: pointer; font-size: 18px; }

.search-wrap { padding: 10px 14px 8px; }
.search-wrap input {
  width: 100%; padding: 8px 10px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text);
  font-size: 12px; outline: none;
  transition: border-color 0.15s;
}
.search-wrap input::placeholder { color: var(--text3); }
.search-wrap input:focus { border-color: var(--accent); }

.sb-label {
  font-family: var(--mono); font-size: 10px; font-weight: 600;
  color: var(--text3); text-transform: uppercase; letter-spacing: 0.04em;
  padding: 10px 18px 4px;
}
.nav-list { list-style: none; padding: 0 10px; }
.nav-item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 10px; border-radius: var(--radius-sm);
  color: var(--text2); font-size: 13px;
  cursor: pointer; transition: background 0.1s, color 0.1s;
  user-select: none;
}
.nav-item:hover { background: rgba(255,255,255,0.04); color: var(--text); }
.nav-item.active { background: rgba(59,130,246,0.1); color: var(--accent); }
.nav-item .marker { font-family: var(--mono); font-size: 10px; color: var(--text3); min-width: 18px; }
.nav-item.active .marker { color: var(--accent); }
.nav-item.hidden { display: none; }

.sidebar-footer {
  margin-top: auto; padding: 12px 18px;
  border-top: 1px solid var(--border);
  font-size: 11px; color: var(--text3); line-height: 1.6;
}
.sidebar-footer a { color: var(--text2); }

/* Main */
.main { padding: 36px 44px; max-width: 900px; min-height: 100vh; }

.page-header { margin-bottom: 28px; }
.breadcrumb { font-family: var(--mono); font-size: 11px; color: var(--text3); margin-bottom: 6px; }
.breadcrumb .sep { margin: 0 6px; opacity: 0.4; }
.breadcrumb .current { color: var(--accent); }
h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.03em; line-height: 1.2; margin-bottom: 4px; }
.subtitle { color: var(--text3); font-size: 13px; max-width: 460px; }

/* Sections */
.section { margin-top: 34px; }
.section-title {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 10px;
}
.section-title h2 {
  font-family: var(--mono); font-size: 11px; font-weight: 600;
  color: var(--text2); text-transform: uppercase; letter-spacing: 0.04em;
}
.section-title .rule { flex: 1; height: 1px; background: var(--border); }

/* Setup table */
.setup-table {
  border: 1px solid var(--border); border-radius: var(--radius);
  overflow: hidden;
}
.setup-row {
  display: grid; grid-template-columns: 140px 1fr;
  border-bottom: 1px solid var(--border-light);
  cursor: pointer; transition: background 0.1s;
}
.setup-row:last-child { border-bottom: none; }
.setup-row:hover { background: rgba(255,255,255,0.02); }
.setup-row.copied { background: rgba(34,197,94,0.06); }
.setup-label {
    font-family: var(--mono); font-size: 11px; color: var(--text3);
    padding: 8px 12px; display: flex; align-items: center;
  }
  .setup-value {
    font-family: var(--mono); font-size: 12px; font-weight: 600;
    padding: 8px 12px; display: flex; align-items: center; gap: 6px;
  }
  .setup-value .copy-hint { font-size: 9px; color: var(--text3); opacity: 0; transition: opacity 0.1s; margin-left: auto; }
.setup-row:hover .copy-hint { opacity: 1; }
.setup-row.copied .copy-hint { opacity: 1; color: var(--green); }
.setup-value.on  { color: var(--green); }
  .setup-value.off { color: var(--red); }
  .setup-value.na  { color: var(--text3); }
  .setup-value.warn{ color: var(--amber); }

/* Cards */
.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.info-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px 18px;
}
.info-card h3 {
  font-family: var(--mono); font-size: 11px; font-weight: 600;
  color: var(--text2); text-transform: uppercase; letter-spacing: 0.04em;
  margin-bottom: 10px;
}
.info-card ul { list-style: none; }
.info-card li { padding: 5px 0; font-size: 13px; color: var(--text); display: flex; gap: 8px; }
.info-card li::before { content: "--"; color: var(--accent); flex-shrink: 0; }
.info-card li:hover { color: var(--accent); cursor: pointer; }
.info-card li.copied { color: var(--green); }

/* Errors */
.error-list { display: flex; flex-direction: column; gap: 8px; }
.error-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-left: 3px solid var(--amber); border-radius: var(--radius);
  padding: 14px 16px;
}
.error-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 4px; }
.error-name { font-weight: 600; font-size: 14px; flex: 1; }
.error-fix { color: var(--text2); font-size: 13px; line-height: 1.7; white-space: pre-wrap; }
.error-fix code {
  font-family: var(--mono); font-size: 11px; background: var(--bg);
  color: var(--accent); padding: 1px 5px; border-radius: 3px;
  border: 1px solid var(--border); word-break: break-all; cursor: pointer;
}
.error-fix code:hover { background: var(--bg3); }
.error-fix code.copied { color: var(--green); border-color: rgba(34,197,94,0.3); background: rgba(34,197,94,0.08); }

/* Variants */
.variant-pills { display: flex; flex-wrap: wrap; gap: 5px; margin: 8px 0 4px; }
.variant-pill {
  background: var(--bg2); border: 1px solid var(--border);
  color: var(--text2); padding: 4px 10px; border-radius: var(--radius-sm);
  font-size: 11px; font-family: var(--mono); cursor: pointer;
  transition: border-color 0.12s, color 0.12s; user-select: none;
}
.variant-pill:hover { border-color: var(--accent); color: var(--text); }
.variant-pill.active { border-color: var(--accent); color: var(--accent); background: rgba(59,130,246,0.08); }

/* Buttons */
.btn {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 5px 10px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); background: var(--bg);
  color: var(--text2); font-family: var(--mono); font-size: 10px;
  text-transform: uppercase; cursor: pointer;
  transition: border-color 0.12s, color 0.12s; user-select: none;
}
.btn:hover { border-color: var(--accent); color: var(--accent); }
.btn.copied { border-color: var(--green); color: var(--green); background: rgba(34,197,94,0.08); }
.btn svg { width: 11px; height: 11px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

.copy-btn {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 10px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); background: var(--bg);
  color: var(--text2); font-family: var(--mono); font-size: 10px;
  text-transform: uppercase; cursor: pointer;
  transition: border-color 0.12s, color 0.12s; user-select: none;
  flex-shrink: 0;
}
.copy-btn:hover { border-color: var(--accent); color: var(--accent); }
.copy-btn.copied { border-color: var(--green); color: var(--green); background: rgba(34,197,94,0.08); }
.copy-btn svg { width: 11px; height: 11px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

.copy-all {
  margin-left: auto;
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 8px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); background: var(--bg);
  color: var(--text2); font-family: var(--mono); font-size: 10px;
  text-transform: uppercase; cursor: pointer;
  transition: border-color 0.12s, color 0.12s; user-select: none;
}
.copy-all:hover { border-color: var(--accent); color: var(--accent); }
.copy-all.copied { border-color: var(--green); color: var(--green); background: rgba(34,197,94,0.08); }

/* Note */
.note {
  background: rgba(234,179,8,0.06); border: 1px solid rgba(234,179,8,0.2);
  border-radius: var(--radius); padding: 12px 16px; margin-top: 14px;
  font-size: 13px; color: var(--text);
}
.note .tag { font-family: var(--mono); font-size: 10px; color: var(--amber); text-transform: uppercase; font-weight: 600; margin-right: 6px; }

/* Toast */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(8px);
  background: var(--bg3); border: 1px solid var(--accent); color: var(--accent);
  font-family: var(--mono); font-size: 12px; padding: 8px 16px; border-radius: var(--radius-sm);
  opacity: 0; pointer-events: none; transition: opacity 0.2s, transform 0.2s; z-index: 1000;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Overlay */
.sidebar-overlay {
  display: none; position: fixed; inset: 0; z-index: 20;
  background: rgba(0,0,0,0.5); opacity: 0; transition: opacity 0.2s;
  pointer-events: none;
}
.sidebar-overlay.open { opacity: 1; pointer-events: auto; }

/* Mobile top bar */
.mob-topbar { display: none; }

/* Admin FAB */
.admin-fab {
  display: block; position: fixed; right: 16px; bottom: 16px; z-index: 50;
  background: var(--bg2); border: 1px solid var(--border); color: var(--text3);
  font-family: var(--mono); font-size: 10px; text-transform: uppercase;
  padding: 6px 12px; border-radius: var(--radius-sm); cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
}
.admin-fab:hover { border-color: var(--accent); color: var(--accent); }

/* Admin modal */
.admin-modal {
  position: fixed; inset: 0; z-index: 2000;
  background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center;
  padding: 16px; opacity: 0; visibility: hidden; pointer-events: none;
  transition: opacity 0.2s, visibility 0.2s;
}
.admin-modal.show { opacity: 1; visibility: visible; pointer-events: auto; }
.admin-panel {
  width: min(780px, 100%); max-height: 90vh; overflow: auto;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px;
}
.admin-title { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; gap: 10px; }
.admin-title h3 { font-size: 16px; font-weight: 600; }
.admin-shell { display: grid; grid-template-columns: 190px 1fr; gap: 12px; margin-top: 8px; }
.admin-side { border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg); padding: 10px; max-height: 60vh; overflow-y: auto; }
.admin-main { border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg); padding: 10px; }
.admin-select {
  width: 100%; background: var(--bg2); border: 1px solid var(--border);
  color: var(--text); border-radius: var(--radius-sm); padding: 6px 8px;
  font-family: var(--mono); font-size: 11px; margin-bottom: 8px;
}
.admin-select:focus { outline: none; border-color: var(--accent); }
.admin-field { display: flex; flex-direction: column; gap: 4px; }
.admin-field label { font-family: var(--mono); font-size: 10px; color: var(--text3); text-transform: uppercase; }
.admin-field select, .admin-field input, .admin-field textarea {
  background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-sm);
  color: var(--text); padding: 6px 8px; font-family: var(--mono); font-size: 11px;
}
.admin-field textarea { min-height: 90px; resize: vertical; }
.admin-actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
.admin-actions button {
  background: var(--bg2); border: 1px solid var(--border); color: var(--text2);
  font-family: var(--mono); font-size: 10px; text-transform: uppercase;
  padding: 5px 10px; border-radius: var(--radius-sm); cursor: pointer;
  transition: border-color 0.12s, color 0.12s;
}
.admin-actions button:hover { border-color: var(--accent); color: var(--accent); }
.admin-actions button:disabled { opacity: 0.4; cursor: not-allowed; }
.admin-switches { display: flex; gap: 4px; margin-bottom: 8px; flex-wrap: wrap; }
.mini-btn {
  background: var(--bg2); border: 1px solid var(--border); color: var(--text3);
  font-family: var(--mono); font-size: 10px; padding: 4px 8px; border-radius: var(--radius-sm);
  cursor: pointer; transition: border-color 0.12s, color 0.12s;
}
.mini-btn:hover { border-color: var(--accent); color: var(--accent); }
.admin-section-btn.active { color: var(--accent); border-color: var(--accent); background: rgba(59,130,246,0.08); }
.admin-section-panel { display: none; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px; background: rgba(19,19,22,0.5); }
.admin-section-panel.active { display: block; }
.admin-block { border: 1px solid var(--border); border-radius: var(--radius-sm); margin-top: 10px; overflow: hidden; }
.admin-block summary {
  list-style: none; cursor: pointer; padding: 7px 10px;
  font-family: var(--mono); font-size: 10px; text-transform: uppercase;
  background: var(--bg2); color: var(--text3);
}
.admin-block summary::-webkit-details-marker { display: none; }
.admin-block-body { padding: 10px; }
.mini-row { display: grid; grid-template-columns: 1fr auto; gap: 6px; margin-bottom: 6px; }
.mini-row input {
  width: 100%; background: var(--bg2); border: 1px solid var(--border);
  color: var(--text); border-radius: var(--radius-sm); padding: 6px 8px;
  font-family: var(--mono); font-size: 11px;
}
.mini-row input:focus { outline: none; border-color: var(--accent); }
.admin-preview {
  margin-top: 8px; border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 8px; background: var(--bg); font-size: 11px; color: var(--text2);
  white-space: pre-wrap; max-height: 180px; overflow: auto;
}

.setup-toggles { display: none; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 6px; }
.setup-toggles.show { display: grid; }
.setup-toggle { border: 1px solid var(--border); background: var(--bg2); border-radius: var(--radius-sm); padding: 8px 10px; display: flex; flex-direction: column; gap: 6px; min-height: 60px; }
.setup-toggle-label { font-family: var(--mono); font-size: 10px; color: var(--text2); text-transform: uppercase; line-height: 1.2; }

.setup-switch { position: relative; width: 34px; height: 18px; flex-shrink: 0; }
.setup-switch input { opacity: 0; width: 0; height: 0; position: absolute; }
.setup-slider { position: absolute; inset: 0; background: var(--border); border-radius: 999px; cursor: pointer; }
.setup-slider::before { content: ""; position: absolute; width: 12px; height: 12px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: transform 0.15s; }
.setup-switch input:checked + .setup-slider { background: var(--accent); }
.setup-switch input:checked + .setup-slider::before { transform: translateX(14px); }

.setup-state-row { display: flex; align-items: center; justify-content: space-between; gap: 6px; width: 100%; }
.tri-toggle { width: 48px; height: 20px; border-radius: 999px; border: 1px solid var(--border); background: var(--bg3); position: relative; cursor: pointer; }
.tri-toggle::before { content: ""; position: absolute; top: 2px; left: 2px; width: 14px; height: 14px; border-radius: 50%; background: var(--text2); transition: transform 0.2s; }
.tri-toggle[data-state="N/A"] { border-color: rgba(234,179,8,0.4); background: rgba(234,179,8,0.06); }
.tri-toggle[data-state="N/A"]::before { transform: translateX(12px); background: var(--amber); }
.tri-toggle[data-state="ON"] { border-color: rgba(34,197,94,0.5); background: rgba(34,197,94,0.06); }
.tri-toggle[data-state="ON"]::before { transform: translateX(26px); background: var(--green); }
.tri-toggle-label { font-family: var(--mono); font-size: 10px; color: var(--text3); min-width: 28px; text-align: right; }
.tri-toggle-label.on { color: var(--green); }
.tri-toggle-label.na { color: var(--amber); }

.error-grid { display: grid; grid-template-columns: 150px 1fr; gap: 8px; }
.error-list-admin { border: 1px solid var(--border); border-radius: var(--radius-sm); max-height: 180px; overflow: auto; padding: 4px; }
.error-item-admin { width: 100%; text-align: left; margin-bottom: 3px; background: transparent; border: 1px solid transparent; color: var(--text2); border-radius: 3px; padding: 4px 6px; cursor: pointer; font-size: 11px; }
.error-item-admin.active { color: var(--accent); border-color: var(--border); background: rgba(59,130,246,0.06); }
.error-item-admin:hover { color: var(--text); }

.product-logo { position: fixed; top: 12px; right: 14px; z-index: 1200; display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg2); pointer-events: none; }
.product-logo-mark { width: 24px; height: 24px; border-radius: 4px; display: grid; place-items: center; color: #fff; font-size: 12px; font-weight: 600; background: var(--accent); }
.product-logo-name { font-family: var(--mono); font-size: 10px; color: var(--text3); text-transform: uppercase; }
.no-results { display: none; text-align: center; padding: 60px 20px; color: var(--text3); font-family: var(--mono); font-size: 13px; }
.no-results.show { display: block; }

/* Mobile */
@media (max-width: 768px) {
  html { font-size: 15px; }
  .layout { grid-template-columns: 1fr; }
  .mob-topbar {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; background: var(--bg);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 30;
  }
  .mob-topbar .brand-title { font-family: var(--mono); font-size: 11px; color: var(--accent); font-weight: 600; text-transform: uppercase; white-space: nowrap; flex-shrink: 0; }
  .mob-search {
    flex: 1; min-width: 0; padding: 6px 10px;
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text);
    font-family: var(--font); font-size: 13px; outline: none;
  }
  .mob-search::placeholder { color: var(--text3); font-size: 12px; }
  .mob-search:focus { border-color: var(--accent); }
  .mobile-toggle {
    display: flex; align-items: center; justify-content: center;
    width: 36px; height: 36px; background: none; border: none;
    color: var(--text); cursor: pointer; flex-shrink: 0;
  }
  .mobile-toggle svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; }

  .sidebar {
    position: fixed; top: 0; left: 0; z-index: 40;
    height: 100dvh; width: 100dvw;
    transform: translateX(-100%); transition: transform 0.25s ease;
  }
  .sidebar.open { transform: translateX(0); }
  .sidebar-close { display: flex; }
  .sidebar-overlay { display: block; }

  .sidebar-header { padding: 16px; display: flex; align-items: center; justify-content: space-between; }

  .main { padding: 16px 14px; max-width: 100%; }
  h1 { font-size: 22px; }
  .breadcrumb { font-size: 10px; }
  .section { margin-top: 26px; }
  .info-grid { grid-template-columns: 1fr; gap: 10px; }
  .setup-row { grid-template-columns: 120px 1fr; }
  .setup-label { font-size: 10px; padding: 8px 10px; }
    .setup-value { font-size: 11px; padding: 8px 10px; }

  .error-card { padding: 12px 14px; }
  .error-header { flex-direction: column; gap: 8px; }
  .error-name { font-size: 13px; }
  .error-fix { font-size: 12px; }

  .admin-shell { grid-template-columns: 1fr; }
  .error-grid { grid-template-columns: 1fr; }
  .setup-toggles { grid-template-columns: 1fr 1fr; gap: 6px; }

  .product-logo { display: none; }
  .admin-panel { padding: 12px; }
  .variant-pill { font-size: 10px; padding: 4px 8px; }
}

@media (max-width: 480px) {
  h1 { font-size: 19px; }
  .main { padding: 14px 10px; }

const STORAGE_KEY = 'cosmo_support_data_v1';
const DEFAULT_PRODUCTS = JSON.parse(JSON.stringify(products));
const DEFAULT_GENERAL_PAGES = JSON.parse(JSON.stringify(generalPages));

function loadStoredData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const parsed = JSON.parse(raw);
    if (Array.isArray(parsed.products) && parsed.products.length > 0) {
      const requiredKeys = ['key', 'name', 'category', 'setup'];
      const allValid = parsed.products.every(p =>
        requiredKeys.every(k => p && p[k] !== undefined) &&
        Array.isArray(p.windows) &&
        Array.isArray(p.requirements)
      );
      if (allValid) {
        products.length = 0;
        parsed.products.forEach(p => products.push(p));
      }
    }
    // Migrate: add variants to all products if missing from stored data
    products.forEach(p => {
      if (p.variants) return;
      const fresh = DEFAULT_PRODUCTS.find(d => d.key === p.key);
      if (fresh && fresh.variants) {
        p.variants = JSON.parse(JSON.stringify(fresh.variants));
        p.selectedVariant = null;
      }
    });
    if (parsed.generalPages && typeof parsed.generalPages === 'object' && Object.keys(parsed.generalPages).length > 0) {
      Object.keys(generalPages).forEach(k => delete generalPages[k]);
      Object.keys(parsed.generalPages).forEach(k => {
        generalPages[k] = parsed.generalPages[k];
      });
    }
  } catch (err) {
    console.error('Failed to load saved data', err);
  }
}

function persistData() {
  const snapshot = {
    products: products,
    generalPages: generalPages,
    updatedAt: new Date().toISOString()
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(snapshot));
}

const API_BASE = '/api/data';

async function syncFromApi() {
  try {
    const res = await fetch(API_BASE);
    const json = await res.json();
    if (json.ok && json.data && Array.isArray(json.data.products)) {
      const remote = json.data.products;
      const merged = remote.map(rp => {
        const local = products.find(p => p.key === rp.key);
        return local ? mergeProductData(local, rp) : rp;
      });
      const remoteKeys = new Set(remote.map(p => p.key));
      products.filter(p => !remoteKeys.has(p.key)).forEach(p => merged.push(p));
      products.length = 0;
      merged.forEach(p => products.push(p));
      if (json.data.generalPages) {
        Object.keys(json.data.generalPages).forEach(k => { generalPages[k] = json.data.generalPages[k]; });
      }
      persistData();
      return true;
    }
  } catch {}
  return false;
}

function mergeProductData(local, remote) {
  const merged = { ...remote, variants: remote.variants ? { ...remote.variants } : undefined };
  if (local.variants && merged.variants) {
    Object.keys(local.variants).forEach(k => {
      if (!merged.variants[k]) merged.variants[k] = local.variants[k];
    });
  }
  return merged;
}

async function syncToApi(adminKey) {
  try {
    const snapshot = {
      products: products.map(p => {
        const clean = { ...p };
        delete clean.selectedVariant;
        return clean;
      }),
      generalPages: generalPages
    };
    const res = await fetch(API_BASE, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-admin-key': adminKey || '' },
      body: JSON.stringify(snapshot)
    });
    const json = await res.json();
    return json.ok;
  } catch { return false; }
}

function classifyValue(val) {
  const v = val.toUpperCase();
  if (v === 'ON' || v === 'ENABLED') return 'on';
  if (v === 'OFF' || v === 'DISABLED') return 'off';
  if (v === 'N/A') return 'na';
  if (v.includes('ON') && v.includes('OFF')) return 'warn';
  if (v.includes('ON') || v.includes('ENABLED')) return 'warn';
  if (v === 'DEFAULT') return 'na';
  return 'warn';
}

const COPY_ICON = `<svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;

function escapeAttr(s) {
  return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function stripHtml(html) {
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  return (tmp.textContent || tmp.innerText || '').trim();
}

function getEffectiveData(p, variantKey) {
  if (!variantKey || !p.variants || !p.variants[variantKey]) return p;
  const v = p.variants[variantKey];
  const merged = {
    ...p,
    setup: { ...p.setup, ...(v.setup || {}) },
    windows: v.windows && v.windows.length ? v.windows : p.windows,
    requirements: v.requirements && v.requirements.length ? v.requirements : p.requirements,
    errors: v.errors && v.errors.length ? v.errors : p.errors
  };
  return merged;
}

function getSortedVariantKeys(p) {
  if (!p.variants) return [];
  return Object.keys(p.variants).sort((a, b) => p.variants[a].name.localeCompare(p.variants[b].name));
}

function getActiveVariantKey(p) {
  if (!p.variants) return null;
  const stored = p.selectedVariant;
  if (stored && p.variants[stored]) return stored;
  const sorted = getSortedVariantKeys(p);
  return sorted[0] || null;
}

function getOrderedProductKeys(visibleOnly) {

    .filter(item => !visibleOnly || !item.classList.contains('hidden'))

function goToRelativeProduct(step) {
  const keys = getOrderedProductKeys(true);
  const fallbackKeys = keys.length ? keys : getOrderedProductKeys(false);
  if (!fallbackKeys.length) return;

  const current = getCurrentSelectedProductKey();
  const currentIndex = fallbackKeys.indexOf(current);
  const safeIndex = currentIndex === -1 ? 0 : currentIndex;
  const nextIndex = (safeIndex + step + fallbackKeys.length) % fallbackKeys.length;
  selectProduct(fallbackKeys[nextIndex]);
}

function selectProduct(key, variantKey) {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.key === key));

  if (product) {

      if (effectiveKey) product.selectedVariant = effectiveKey;
    }
    applyThemeByKey(product.key);
    updateProductLogo(product.key, product.name);
    content.innerHTML = renderProduct(product, product.selectedVariant);
    localStorage.setItem(LAST_PRODUCT_KEY, product.key);
    if (product.selectedVariant) localStorage.setItem(LAST_VARIANT_KEY, product.selectedVariant);
    history.replaceState(null, '', '#' + product.key);
    return;
  }
  if (generalPages[key]) {
    applyThemeByKey(key === 'extra-kane' ? 'kane' : 'naxo');
    updateProductLogo(key === 'extra-kane' ? 'kane' : 'naxo', generalPages[key].name);
    content.innerHTML = renderGeneralPage(generalPages[key]);

function createProductKey(name) {
  const base = String(name || '')
    .toLowerCase()
    .replace(/[^a-z0-9]+/g, '-')
    .replace(/^-+|-+$/g, '') || 'product';
  let key = base;
  let i = 2;
  while (products.some(p => p.key === key)) {
    key = `${base}-${i}`;
    i += 1;
  }
  return key;
}

function createVariantKey(name, variants) {
  const base = String(name || '')
    .toLowerCase()
    .replace(/[^a-z0-9]+/g, '') || 'game';
  let key = base;
  let i = 2;
  while (variants && variants[key]) {
    key = `${base}${i}`;
    i += 1;
  }
  return key;
}

function applyThemeByKey(key) {
  const t = productThemes[key] || defaultTheme;
  const root = document.documentElement;
  root.style.setProperty('--theme-a', t.a);
  root.style.setProperty('--theme-b', t.b);
  root.style.setProperty('--theme-c', t.c);
  root.style.setProperty('--theme-bg-start', t.bg[0]);
  root.style.setProperty('--theme-bg-mid', t.bg[1]);
  root.style.setProperty('--theme-bg-end', t.bg[2]);
  root.style.setProperty('--sidebar-top', t.side[0]);
  root.style.setProperty('--sidebar-bottom', t.side[1]);
}

function updateProductLogo(key, label) {
  const mark = productLogoMarks[key] || (label ? label.trim().charAt(0).toUpperCase() : 'â€¢');
  productLogoMark.textContent = mark;
  productLogoName.textContent = label || 'General';
  productLogo.style.opacity = '1';
  productLogo.style.transform = 'translateY(0)';
  if (mobBrand) mobBrand.textContent = label || 'Cosmo';
}

let adminSelectedProductKey = null;
let adminSelectedErrorIndex = -1;
let adminSelectedVariantKey = null;

function getSortedProducts() {
  return [...products].sort((a, b) => a.name.localeCompare(b.name));
}

function getAdminSelectedProduct() {
  const p = products.find(p => p.key === adminSelectedProductKey) || null;
  return p;
}

function getAdminVariantTarget() {
  const p = getAdminSelectedProduct();
  if (!p || !p.variants) return { product: p, data: p, isVariant: false, variantKey: null };
  const vk = adminSelectedVariantKey && p.variants[adminSelectedVariantKey] ? adminSelectedVariantKey : Object.keys(p.variants)[0] || null;
  if (vk) adminSelectedVariantKey = vk;
  return { product: p, data: p.variants[vk] || p, isVariant: true, variantKey: vk || null };
}

function setAdminSelectedProduct(key, preserveVariant) {
  if (!products.some(p => p.key === key)) return;
  adminSelectedProductKey = key;
  if (!preserveVariant) adminSelectedVariantKey = null;
  renderAdminProductSelect();
  renderAdminVariantSelect();
  renderVisualSetupToggles();
  renderVisualListEditor();
  renderVisualErrorEditor();
}

function renderAdminProductSelect() {
  const list = getSortedProducts().map(p => `<option value="${p.key}">${p.name}</option>`).join('');
  adminProductSelect.innerHTML = list;
  if (adminSelectedProductKey) adminProductSelect.value = adminSelectedProductKey;
  const selected = getAdminSelectedProduct();
  adminProductNameInline.value = selected ? selected.name : '';
  renderAdminVariantSelect();
}

function renderAdminVariantSelect() {
  const p = getAdminSelectedProduct();
  if (!p || !p.variants) {
    adminVariantWrap.style.display = 'none';
    adminSelectedVariantKey = null;
    return;
  }
  adminVariantWrap.style.display = 'block';
  const allKeys = getSortedVariantKeys(p);
  if (!adminSelectedVariantKey || !p.variants[adminSelectedVariantKey]) {
    adminSelectedVariantKey = allKeys[0] || null;
  }
  adminVariantSelect.innerHTML = allKeys.map(k => `<option value="${k}">${escapeAttr(p.variants[k].name)}</option>`).join('');
  if (adminSelectedVariantKey) adminVariantSelect.value = adminSelectedVariantKey;
  adminVariantNameInline.value = adminSelectedVariantKey && p.variants[adminSelectedVariantKey] ? p.variants[adminSelectedVariantKey].name : '';
}

function renderVisualSetupToggles() {
  const { product: p, data: target, isVariant } = getAdminVariantTarget();
  if (!p) return;
  const setupObj = target.setup || {};
  setupTogglesVisual.innerHTML = setupKeys.map(({ k, label }) => {
    const raw = String(setupObj[k] || (isVariant ? '' : '')).toUpperCase();
    const effective = raw || (p.setup ? String(p.setup[k] || '').toUpperCase() : '');
    const state = effective === 'ON' || effective === 'ENABLED' ? 'on' : (effective === 'N/A' || effective === 'DEFAULT' ? 'na' : (raw ? 'off' : 'off'));
    const display = raw || effective || 'OFF';
    return `<div class="setup-toggle"><span class="setup-toggle-label">${label}</span><div class="setup-state-row" data-visual-setup="${k}"${isVariant ? ` data-variant-setup="${k}"` : ''}><button class="tri-toggle" data-state="${display}" aria-label="Toggle ${label} state"></button><span class="tri-toggle-label ${state}">${display}</span></div></div>`;
  }).join('');
}

function renderVisualListEditor() {
  const { product: p, data: target, isVariant } = getAdminVariantTarget();
  if (!p) return;
  const win = (target.windows && target.windows.length) ? target.windows : p.windows;
  const req = (target.requirements && target.requirements.length) ? target.requirements : p.requirements;
  adminWindowsList.innerHTML = win.map((item, i) => `<div class="mini-list-item"><input data-win-input="${i}" value="${escapeAttr(item)}"><button class="mini-btn" data-win-save="${i}">Save</button><button class="mini-btn" data-win-del="${i}">Del</button></div>`).join('');
  adminReqList.innerHTML = req.map((item, i) => `<div class="mini-list-item"><input data-req-input="${i}" value="${escapeAttr(item)}"><button class="mini-btn" data-req-save="${i}">Save</button><button class="mini-btn" data-req-del="${i}">Del</button></div>`).join('');
}

function splitFixAndLink(html) {
  const linkMatch = String(html).match(/<a[^>]*href="([^"]+)"[^>]*>/i);
  const link = linkMatch ? linkMatch[1] : '';
  const text = String(html).replace(/<a[^>]*>.*?<\/a>/gis, '').trim();
  return { text, link };
}

function renderVisualErrorEditor() {
  const { product: p, data: target, isVariant } = getAdminVariantTarget();
  if (!p) return;
  if (!Array.isArray(target.errors)) target.errors = [];
  if (isVariant && target.errors.length === 0 && Array.isArray(p.errors) && p.errors.length) {
    target.errors = p.errors.map(e => ({ name: e.name, fix: e.fix }));
  }
  const errArr = target.errors || [];
  if (errArr.length === 0) {
    adminSelectedErrorIndex = -1;
    adminErrorTitle.value = '';
    adminErrorFix.value = '';
    adminErrorLink.value = '';
  } else if (adminSelectedErrorIndex < 0 || adminSelectedErrorIndex >= errArr.length) {
    adminSelectedErrorIndex = 0;
  }

  adminErrorList.innerHTML = errArr.map((e, i) => `<button class="error-item-admin ${i === adminSelectedErrorIndex ? 'active' : ''}" data-error-pick="${i}">${escapeAttr(e.name)}</button>`).join('');

  if (adminSelectedErrorIndex >= 0 && errArr[adminSelectedErrorIndex]) {
    const current = errArr[adminSelectedErrorIndex];
    const parts = splitFixAndLink(current.fix || '');
    adminErrorTitle.value = current.name || '';
    adminErrorFix.value = parts.text || '';
    adminErrorLink.value = parts.link || '';
  }

  const eff = getEffectiveData(p, adminSelectedVariantKey || undefined);
  adminPreviewVisual.textContent = JSON.stringify({
    product: p.name,
    variant: adminSelectedVariantKey || null,
    setup: eff.setup,
    windows: eff.windows,
    requirements: eff.requirements,
    errors: eff.errors
  }, null, 2);
}

function saveAndRefreshAdmin(productKeyToSelect, variantKey) {
  persistData();

  renderAdminProductSelect();
  renderAdminVariantSelect();

  selectProduct(pick, adminSelectedVariantKey || undefined);

adminAddErrorBtn.addEventListener('click', () => {
  const { product: p, data: target, isVariant } = getAdminVariantTarget();
  if (!p) return;
  if (!target.errors) target.errors = [];
  if (isVariant && target.errors.length === 0 && Array.isArray(p.errors) && p.errors.length) {
    target.errors = p.errors.map(e => ({ name: e.name, fix: e.fix }));
  }
  target.errors.push({ name: `Error ${target.errors.length + 1}`, fix: '' });
  adminSelectedErrorIndex = target.errors.length - 1;
  saveAndRefreshAdmin(p.key, adminSelectedVariantKey);
});

adminErrorSave.addEventListener('click', () => {
  const { product: p, data: target, isVariant } = getAdminVariantTarget();
  if (!p) return;
  if (!Array.isArray(target.errors)) target.errors = [];
  const title = adminErrorTitle.value.trim();
  const fix = adminErrorFix.value.trim();
  const link = adminErrorLink.value.trim();
  if (!title && !fix && !link) {
    showToast('âœ• Enter error title or fix');
    return;
  }
  const withLink = link ? `${fix}\n<a href="${escapeAttr(link)}" target="_blank">Open link</a>` : fix;
  if (adminSelectedErrorIndex < 0 || adminSelectedErrorIndex >= target.errors.length) {
    target.errors.push({ name: title || `Error ${target.errors.length + 1}`, fix: withLink });
    adminSelectedErrorIndex = target.errors.length - 1;
  } else {
    target.errors[adminSelectedErrorIndex] = {
      name: title || target.errors[adminSelectedErrorIndex].name || 'Error',
      fix: withLink
    };
  }
  saveAndRefreshAdmin(p.key, adminSelectedVariantKey);
});

adminErrorDelete.addEventListener('click', () => {
  const { product: p, data: target, isVariant } = getAdminVariantTarget();
  if (!p || !target.errors || adminSelectedErrorIndex < 0) return;
  target.errors.splice(adminSelectedErrorIndex, 1);
  adminSelectedErrorIndex = Math.max(0, adminSelectedErrorIndex - 1);
  saveAndRefreshAdmin(p.key, adminSelectedVariantKey);
});

adminErrorDuplicate.addEventListener('click', () => {
  const { product: p, data: target, isVariant } = getAdminVariantTarget();
  if (!p || !target.errors || adminSelectedErrorIndex < 0) return;
  const current = target.errors[adminSelectedErrorIndex];
  target.errors.splice(adminSelectedErrorIndex + 1, 0, { name: `${current.name} (Copy)`, fix: current.fix });
  adminSelectedErrorIndex += 1;
  saveAndRefreshAdmin(p.key, adminSelectedVariantKey);
});

adminSaveProductInline.addEventListener('click', () => {
  const p = getAdminSelectedProduct();
  const name = adminProductNameInline.value.trim();
  if (!p || !name) return;
  p.name = name;
  saveAndRefreshAdmin(p.key);
});

adminAddProductInline.addEventListener('click', () => {
  const name = adminNewProductInline.value.trim();
  if (!name) return;
  const key = createProductKey(name);
  products.push({ key, name, category: 'Products', setup: { tpm: 'N/A', secureBoot: 'OFF', virtualization: 'OFF', defender: 'OFF', firewall: 'OFF', exploit: 'OFF' }, windows: ['ALL Windows versions'], requirements: ['UEFI BIOS', 'Visuals installed (*visual)', 'Core Isolation off'], errors: [] });
  adminNewProductInline.value = '';
  saveAndRefreshAdmin(key);
});

adminVariantSelect.addEventListener('change', () => {
  adminSelectedVariantKey = adminVariantSelect.value;
  renderVisualSetupToggles();
  renderVisualListEditor();
  renderVisualErrorEditor();
});

adminSaveVariantInline.addEventListener('click', () => {
  const p = getAdminSelectedProduct();
  const name = adminVariantNameInline.value.trim();
  if (!p || !p.variants || !adminSelectedVariantKey || !name) return;
  if (p.variants[adminSelectedVariantKey]) p.variants[adminSelectedVariantKey].name = name;
  saveAndRefreshAdmin(p.key, adminSelectedVariantKey);
});

adminAddVariantInlineBtn.addEventListener('click', () => {
  const p = getAdminSelectedProduct();
  const gameName = adminAddVariantInline.value.trim();
  if (!p || !gameName) return;
  if (!p.variants) p.variants = {};
  const rawKey = createVariantKey(gameName, p.variants);
  if (p.variants[rawKey]) { showToast('âœ• Game already exists'); return; }
  p.variants[rawKey] = { name: gameName, setup: {}, windows: [], requirements: [], errors: [] };
  adminAddVariantInline.value = '';
  adminSelectedVariantKey = rawKey;
  saveAndRefreshAdmin(p.key, rawKey);
});

adminDeleteVariantInline.addEventListener('click', () => {
  const p = getAdminSelectedProduct();
  if (!p || !p.variants || !adminSelectedVariantKey || !p.variants[adminSelectedVariantKey]) return;
  const count = Object.keys(p.variants).length;
  if (count <= 1) {
    showToast('âœ• Keep at least one game');
    return;
  }
  const label = p.variants[adminSelectedVariantKey].name;
  if (!window.confirm(`Delete game "${label}"?`)) return;
  delete p.variants[adminSelectedVariantKey];
  const nextKey = Object.keys(p.variants)[0] || null;
  adminSelectedVariantKey = nextKey;
  saveAndRefreshAdmin(p.key, nextKey || undefined);
});

function exportData() {
  const snapshot = {
    products: products,
    generalPages: generalPages,
    updatedAt: new Date().toISOString()
  };
  const blob = new Blob([JSON.stringify(snapshot, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'cosmo-support-data.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('âœ“ Exported');
}

adminExportVisual.addEventListener('click', exportData);
adminImportVisual.addEventListener('click', () => {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'application/json';
  input.onchange = async e => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      const text = await file.text();
      const parsed = JSON.parse(text);
      if (!Array.isArray(parsed.products) || !parsed.generalPages) {
        showToast('âœ• Invalid JSON format');
        return;
      }
      products.length = 0;
      parsed.products.forEach(p => products.push(p));
      Object.keys(generalPages).forEach(k => delete generalPages[k]);
      Object.keys(parsed.generalPages).forEach(k => {
        generalPages[k] = parsed.generalPages[k];
      });
      persistData();
      buildNav();
      initializeNavAccessibility();
      selectProduct(products[0] ? products[0].key : 'naxo');
      adminSelectedProductKey = products[0] ? products[0].key : null;
      if (adminSelectedProductKey) setAdminSelectedProduct(adminSelectedProductKey);
      showToast('âœ“ Imported');
    } catch (err) {
      showToast('âœ• Import failed');
    }
  };
  input.click();
});
adminSyncBtn.addEventListener('click', async () => {
  if (!updateAccessGranted) { showToast('âœ• Access denied'); return; }
  adminSyncBtn.disabled = true;
  adminSyncBtn.textContent = 'Syncing...';
  const ok = await syncToApi(ACCESS_PROMPT_ANSWER);
  adminSyncBtn.disabled = false;
  adminSyncBtn.textContent = 'Sync to all users';
  showToast(ok ? 'âœ“ Synced to all users' : 'âœ• Sync failed');
});

adminResetVisual.addEventListener('click', () => {
  products.length = 0;
  DEFAULT_PRODUCTS.forEach(p => products.push(JSON.parse(JSON.stringify(p))));
  Object.keys(generalPages).forEach(k => delete generalPages[k]);
  Object.keys(DEFAULT_GENERAL_PAGES).forEach(k => {
    generalPages[k] = JSON.parse(JSON.stringify(DEFAULT_GENERAL_PAGES[k]));
  });
  persistData();
  buildNav();
  initializeNavAccessibility();
  selectProduct('naxo');
  adminSelectedProductKey = 'naxo';
  setAdminSelectedProduct('naxo');
  showToast('âœ“ Reset to default');
});

adminSelectedProductKey = products[0] ? products[0].key : null;
if (adminSelectedProductKey) setAdminSelectedProduct(adminSelectedProductKey);

/* =========================================================
   COPY-TO-CLIPBOARD
   ========================================================= */
const toast = document.getElementById('toast');
let toastTimer;

function showToast(message = 'âœ“ Copied to clipboard') {
  toast.textContent = message;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 1500);
}

async function copyText(text) {
  try {
    await navigator.clipboard.writeText(text);
    return true;
  } catch (err) {
    // Fallback for older browsers / non-secure contexts
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try {
      document.execCommand('copy');
      document.body.removeChild(ta);
      return true;
    } catch (e) {
      document.body.removeChild(ta);
      return false;
    }
  }
}

function flashCopied(el) {
  el.classList.add('copied');
  setTimeout(() => el.classList.remove('copied'), 1200);
}

// Global click handler â€” copies anything with data-copy, plus <code> tags and links
document.addEventListener('click', async (e) => {
  // Don't intercept actual links â€” let them open
  if (e.target.tagName === 'A' && e.target.href) return;

  // 1. Anything with data-copy attribute
  const copyTarget = e.target.closest('[data-copy]');
  if (copyTarget) {
    e.preventDefault();
    const text = copyTarget.getAttribute('data-copy');
    const ok = await copyText(text);
    if (ok) {
      flashCopied(copyTarget);
      // Update copy button label briefly
      if (copyTarget.classList.contains('copy-btn')) {
        const original = copyTarget.innerHTML;
        copyTarget.innerHTML = `${COPY_ICON} Copied`;
        setTimeout(() => { copyTarget.innerHTML = original; }, 1200);
      }
      showToast();
    } else {
      showToast('âœ• Copy failed');
    }
    return;
  }

  // 2. Inline code tags inside .error-fix
  if (e.target.tagName === 'CODE' && e.target.closest('.error-fix')) {
    const text = e.target.textContent;
    const ok = await copyText(text);
    if (ok) {
      flashCopied(e.target);
      showToast('âœ“ Command copied');
    } else {
      showToast('âœ• Copy failed');
    }
  }
});
