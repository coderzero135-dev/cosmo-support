<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cosmo Support · Product Reference</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Sora:wght@300;400;600;800&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>◎</text></svg>">
<link rel="manifest" href="manifest.json">
<style>
  :root {
    --bg: #070b14;
    --bg-elev: #0f1727;
    --bg-card: #121d31;
    --border: #23324d;
    --border-strong: #35517a;
    --text: #eef5ff;
    --text-dim: #a3b5d1;
    --text-muted: #6f84a8;
    --accent: #39f4b8;
    --accent-dim: #1f6f57;
    --warn: #ffbe72;
    --danger: #ff6c9f;
    --info: #67c3ff;
    --theme-a: 160, 86, 255;
    --theme-b: 255, 88, 168;
    --theme-c: 255, 196, 77;
    --theme-bg-start: #0b0f1d;
    --theme-bg-mid: #10182c;
    --theme-bg-end: #090d18;
    --sidebar-top: 16, 25, 44;
    --sidebar-bottom: 12, 20, 35;
    --ios-ease: cubic-bezier(0.22, 1, 0.36, 1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Sora', -apple-system, sans-serif;
    font-weight: 300;
    line-height: 1.55;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  body {
    background-image:
      radial-gradient(ellipse at top left, rgba(var(--theme-a), 0.2), transparent 45%),
      radial-gradient(ellipse at 20% 80%, rgba(var(--theme-b), 0.18), transparent 45%),
      radial-gradient(ellipse at bottom right, rgba(var(--theme-c), 0.15), transparent 55%),
      linear-gradient(150deg, var(--theme-bg-start) 0%, var(--theme-bg-mid) 38%, var(--theme-bg-end) 100%);
    background-attachment: fixed;
    transition: background-image 0.7s var(--ios-ease);
  }

  .app {
    display: grid;
    grid-template-columns: 320px 1fr;
    min-height: 100vh;
    max-width: 1660px;
    margin: 0 auto;
    gap: 10px;
  }

  /* ============ SIDEBAR ============ */
  .sidebar {
    background: linear-gradient(180deg, rgba(var(--sidebar-top), 0.86), rgba(var(--sidebar-bottom), 0.92));
    border-right: 1px solid var(--border);
    padding: 28px 0;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    box-shadow: 14px 0 40px rgba(0, 0, 0, 0.2);
    backdrop-filter: blur(18px) saturate(130%);
  }

  .sidebar::-webkit-scrollbar { width: 6px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }

  .brand {
    padding: 0 24px 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 16px;
  }

  .brand-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .brand-name {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  .brand-name .dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    background: var(--accent);
    border-radius: 50%;
    margin-left: 6px;
    vertical-align: middle;
    box-shadow: 0 0 12px var(--accent);
  }

  .search-wrap {
    padding: 0 16px 16px;
  }

  .search {
    width: 100%;
    background: rgba(9, 15, 27, 0.7);
    border: 1px solid rgba(53, 81, 122, 0.75);
    color: var(--text);
    padding: 10px 14px;
    border-radius: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    transition: border-color 0.28s var(--ios-ease), background 0.28s var(--ios-ease), box-shadow 0.28s var(--ios-ease);
  }

  .search::placeholder { color: var(--text-muted); }
  .search:focus {
    outline: none;
    border-color: rgba(57, 244, 184, 0.45);
    background: rgba(14, 24, 40, 0.9);
    box-shadow: 0 0 0 3px rgba(57, 244, 184, 0.12);
  }

  .nav-section-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--text-muted);
    text-transform: uppercase;
    padding: 14px 24px 6px;
  }

  .nav-list {
    list-style: none;
    padding: 0 12px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 14px;
    border-radius: 12px;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 14px;
    font-weight: 400;
    transition: background 0.26s var(--ios-ease), color 0.26s var(--ios-ease), transform 0.26s var(--ios-ease), border-color 0.26s var(--ios-ease);
    border: 1px solid transparent;
    user-select: none;
  }

  .nav-item:hover {
    background: linear-gradient(90deg, rgba(57, 244, 184, 0.08), rgba(103, 195, 255, 0.04));
    color: var(--text);
    transform: translateX(3px);
    border-color: rgba(var(--theme-a), 0.18);
  }

  .nav-item:focus-visible {
    outline: 2px solid var(--accent-dim);
    outline-offset: 1px;
  }

  .nav-item.active {
    background: linear-gradient(90deg, rgba(57, 244, 184, 0.14), rgba(103, 195, 255, 0.08));
    color: var(--accent);
    box-shadow: inset 2px 0 0 var(--accent);
  }

  .nav-item .marker {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    width: 18px;
  }

  .nav-item.active .marker { color: var(--accent); }

  .nav-item.hidden { display: none; }

  .sidebar-footer {
    margin-top: auto;
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    line-height: 1.7;
  }

  .sidebar-footer a {
    color: var(--text-dim);
    text-decoration: none;
    border-bottom: 1px dashed var(--border-strong);
  }

  .sidebar-footer a:hover { color: var(--accent); }

  .admin-fab {
    display: none;
    position: fixed;
    right: 16px;
    bottom: 16px;
    z-index: 120;
    background: linear-gradient(145deg, rgba(16, 23, 38, 0.9), rgba(10, 15, 27, 0.92));
    border: 1px solid rgba(255, 255, 255, 0.16);
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 9px 12px;
    border-radius: 999px;
    cursor: pointer;
    box-shadow: 0 14px 30px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.12);
    transition: transform 0.26s var(--ios-ease), box-shadow 0.26s var(--ios-ease), border-color 0.26s var(--ios-ease), color 0.26s var(--ios-ease);
  }

  .admin-fab.unlocked { display: block; }

  .admin-fab:hover {
    color: var(--accent);
    border-color: rgba(var(--theme-a), 0.6);
    transform: translateY(-2px);
    box-shadow: 0 18px 34px rgba(0, 0, 0, 0.34), inset 0 1px 0 rgba(255, 255, 255, 0.16);
  }

  .hidden-access {
    position: fixed;
    top: 10px;
    left: 10px;
    padding: 4px 8px;
    border-radius: 999px;
    border: 1px solid rgba(124, 240, 168, 0.18);
    background: rgba(124, 240, 168, 0.06);
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    line-height: 1;
    z-index: 2200;
    cursor: pointer;
    opacity: 0.45;
    transition: opacity 0.15s, border-color 0.15s, color 0.15s, background 0.15s;
  }

  .hidden-access:hover,
  .hidden-access:focus-visible {
    border-color: rgba(124, 240, 168, 0.45);
    background: rgba(124, 240, 168, 0.14);
    color: var(--accent);
    opacity: 1;
    outline: none;
  }

  .product-logo {
    position: fixed;
    top: 16px;
    right: 18px;
    z-index: 1200;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border-radius: 14px;
    border: 1px solid rgba(255, 255, 255, 0.12);
    background:
      linear-gradient(140deg, rgba(var(--theme-a), 0.22), rgba(var(--theme-b), 0.12)),
      rgba(10, 15, 24, 0.6);
    box-shadow: 0 12px 30px rgba(0, 0, 0, 0.28), inset 0 1px 0 rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(8px);
    pointer-events: none;
    transition: opacity 0.3s ease, transform 0.3s ease, background 0.3s ease;
  }

  .product-logo-mark {
    width: 30px;
    height: 30px;
    border-radius: 10px;
    display: grid;
    place-items: center;
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    background: linear-gradient(160deg, rgba(var(--theme-a), 0.8), rgba(var(--theme-b), 0.65));
    box-shadow: 0 8px 16px rgba(0, 0, 0, 0.25);
  }

  .product-logo-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--text-dim);
    text-transform: uppercase;
    max-width: 160px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    border: 0;
  }

  /* ============ MAIN ============ */
  .main {
    padding: 52px 62px;
    max-width: 1100px;
    animation: pageIntro 0.68s var(--ios-ease);
  }

  @keyframes pageIntro {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .page-header {
    margin-bottom: 36px;
  }

  .breadcrumb {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .breadcrumb .sep { margin: 0 8px; opacity: 0.4; }
  .breadcrumb .current { color: var(--accent); }

  h1 {
    font-size: 46px;
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1.05;
    margin-bottom: 12px;
  }

  .subtitle {
    color: var(--text-dim);
    font-size: 16px;
    max-width: 580px;
    opacity: 0.92;
  }

  /* ============ CARDS ============ */
  .section {
    margin-top: 42px;
  }

  .section-title {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 16px;
  }

  .section-title h2 {
    font-size: 13px;
    font-weight: 600;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text);
  }

  .section-title .rule {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, rgba(57, 244, 184, 0.2), rgba(53, 81, 122, 0.2), rgba(53, 81, 122, 0));
  }

  /* Setup grid */
  .setup-grid {
    display: flex;
    flex-wrap: nowrap;
    gap: 12px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow-x: auto;
    overflow-y: hidden;
    padding: 12px;
    backdrop-filter: blur(8px) saturate(120%);
  }

  .setup-grid::-webkit-scrollbar { height: 6px; }
  .setup-grid::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }

  .setup-cell {
    background: linear-gradient(180deg, rgba(19, 32, 54, 0.92), rgba(15, 26, 43, 0.92));
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-width: 150px;
    flex: 0 0 150px;
    border: 1px solid rgba(53, 81, 122, 0.75);
    border-radius: 14px;
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08), 0 10px 26px rgba(0, 0, 0, 0.14);
    transition: transform 0.26s var(--ios-ease), border-color 0.26s var(--ios-ease);
  }

  .setup-cell:hover {
    transform: translateY(-2px);
    border-color: rgba(var(--theme-a), 0.4);
  }

  .setup-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--text-muted);
    text-transform: uppercase;
    min-height: 2.3em;
    display: flex;
    align-items: flex-start;
  }

  .setup-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding: 4px 8px;
    border-radius: 999px;
    width: fit-content;
    border: 1px solid transparent;
  }

  .setup-value.on    { color: var(--accent); background: rgba(124, 240, 168, 0.08); border-color: rgba(124, 240, 168, 0.22); }
  .setup-value.off   { color: var(--danger); background: rgba(255, 107, 138, 0.08); border-color: rgba(255, 107, 138, 0.25); }
  .setup-value.na    { color: var(--text-muted); background: rgba(92, 100, 115, 0.15); border-color: rgba(92, 100, 115, 0.28); }
  .setup-value.warn  { color: var(--warn); background: rgba(255, 184, 107, 0.08); border-color: rgba(255, 184, 107, 0.24); }

  /* Requirements + Windows */
  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .info-card {
    background: linear-gradient(160deg, rgba(17, 29, 49, 0.94), rgba(12, 22, 37, 0.94));
    border: 1px solid rgba(53, 81, 122, 0.6);
    border-radius: 16px;
    padding: 20px 22px;
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08), 0 14px 30px rgba(0, 0, 0, 0.16);
    transition: transform 0.3s var(--ios-ease), border-color 0.3s var(--ios-ease), box-shadow 0.3s var(--ios-ease);
  }

  .info-card:hover {
    transform: translateY(-3px);
    border-color: rgba(var(--theme-a), 0.42);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.12), 0 18px 38px rgba(0, 0, 0, 0.2);
  }

  .info-card h3 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 14px;
    font-weight: 600;
  }

  .info-card ul {
    list-style: none;
  }

  .info-card li {
    padding: 6px 0;
    color: var(--text);
    font-size: 14px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }

  .info-card li::before {
    content: '▸';
    color: var(--accent);
    flex-shrink: 0;
    margin-top: 2px;
  }

  /* Errors */
  .error-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .error-card {
    background: linear-gradient(160deg, rgba(18, 30, 50, 0.94), rgba(12, 21, 36, 0.94));
    border: 1px solid rgba(53, 81, 122, 0.6);
    border-left: 3px solid var(--warn);
    border-radius: 14px;
    padding: 16px 20px;
    transition: border-color 0.3s var(--ios-ease), transform 0.3s var(--ios-ease), box-shadow 0.3s var(--ios-ease);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08), 0 12px 28px rgba(0, 0, 0, 0.16);
  }

  .error-card:hover {
    border-left-color: var(--accent);
    border-color: rgba(103, 195, 255, 0.5);
    transform: translateY(-2px);
    box-shadow: 0 18px 38px rgba(0, 0, 0, 0.2);
  }

  .error-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 6px;
  }

  .error-name {
    font-weight: 600;
    color: var(--text);
    font-size: 15px;
    flex: 1;
  }

  /* Copy buttons */
  .copy-btn {
    background: rgba(8, 13, 22, 0.5);
    border: 1px solid var(--border-strong);
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 5px 10px;
    border-radius: 999px;
    cursor: pointer;
    transition: all 0.26s var(--ios-ease);
    flex-shrink: 0;
    font-weight: 500;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    user-select: none;
  }

  .copy-btn:hover {
    background: linear-gradient(135deg, rgba(var(--theme-a), 0.12), rgba(var(--theme-c), 0.08));
    color: var(--accent);
    border-color: rgba(var(--theme-a), 0.48);
  }

  .copy-btn.copied {
    color: var(--accent);
    border-color: var(--accent);
    background: rgba(124, 240, 168, 0.08);
  }

  .copy-btn svg {
    width: 11px;
    height: 11px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* Inline code copy on click */
  .error-fix code {
    cursor: pointer;
    position: relative;
    transition: background 0.15s, color 0.15s;
  }

  .error-fix code:hover {
    background: var(--accent-dim);
    color: var(--text);
  }

  .error-fix code.copied {
    background: var(--accent);
    color: var(--bg);
  }

  /* Toast notification */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--bg-card);
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.08em;
    padding: 10px 20px;
    border-radius: 8px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s, transform 0.2s;
    z-index: 1000;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Setup cell — copy on click */
  .setup-cell {
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
  }

  .setup-cell:hover {
    background: linear-gradient(180deg, rgba(23, 38, 62, 0.95), rgba(18, 31, 51, 0.95));
  }

  .setup-cell::after {
    content: 'copy';
    position: absolute;
    top: 8px;
    right: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    opacity: 0;
    transition: opacity 0.15s;
  }

  .setup-cell:hover::after { opacity: 1; }
  .setup-cell.copied::after { content: 'copied'; color: var(--accent); opacity: 1; }

  /* Info card list items — copy on click */
  .info-card li {
    cursor: pointer;
    padding: 6px 8px;
    border-radius: 4px;
    transition: background 0.12s;
    margin: 0 -8px;
  }

  .info-card li:hover {
    background: rgba(9, 16, 28, 0.75);
  }

  .info-card li.copied {
    background: rgba(124, 240, 168, 0.08);
  }

  /* Copy all setup button */
  .section-title .copy-all {
    margin-left: auto;
    background: transparent;
    border: 1px solid var(--border-strong);
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .section-title .copy-all:hover {
    color: var(--accent);
    border-color: var(--accent-dim);
  }

  .section-title .copy-all.copied {
    color: var(--accent);
    border-color: var(--accent);
  }

  .error-fix {
    color: var(--text-dim);
    font-size: 14px;
    line-height: 1.65;
    white-space: pre-wrap;
  }

  .error-fix code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
    background: var(--bg);
    color: var(--accent);
    padding: 2px 6px;
    border-radius: 4px;
    border: 1px solid var(--border);
    word-break: break-all;
  }

  .error-fix a {
    color: var(--info);
    text-decoration: none;
    border-bottom: 1px dashed var(--info);
    word-break: break-all;
  }
  .error-fix a:hover { color: var(--accent); border-color: var(--accent); }

  /* Note callout */
  .note {
    background: linear-gradient(180deg, rgba(255, 184, 107, 0.06), rgba(255, 184, 107, 0.02));
    border: 1px solid rgba(255, 184, 107, 0.2);
    border-radius: 10px;
    padding: 14px 18px;
    margin-top: 16px;
    font-size: 14px;
    color: var(--text);
  }

  .note .tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    color: var(--warn);
    text-transform: uppercase;
    margin-right: 8px;
  }

  /* Empty state */
  .empty {
    text-align: center;

  .admin-main {

  .variant-pill:hover {

  .variant-pill.active {
    border-color: rgba(var(--theme-a), 0.9);

    box-shadow: 0 0 0 1px rgba(var(--theme-a), 0.18) inset, 0 8px 18px rgba(0, 0, 0, 0.28);
  }

  @keyframes adminPop {
    from { opacity: 0; transform: translateY(8px) scale(0.99); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .admin-section-panel {
    transition: opacity 0.2s ease, transform 0.2s ease;
  }

  .admin-section-panel.active {
    animation: sectionIn 0.2s ease-out;
  }

  @keyframes sectionIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .admin-switches {
    display: flex;
    gap: 7px;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }

  .admin-section-btn.active {
    color: var(--accent);
    border-color: rgba(var(--theme-a), 0.55);
    background: linear-gradient(135deg, rgba(var(--theme-a), 0.16), rgba(var(--theme-c), 0.08));
  }

  .admin-section-panel {
    display: none;
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    padding: 10px;
    background: rgba(12, 18, 30, 0.7);
  }

  .admin-section-panel.active { display: block; }

  .admin-block { border: 1px solid var(--border); border-radius: 9px; margin-bottom: 10px; overflow: hidden; }
  .admin-block summary { list-style: none; cursor: pointer; padding: 10px 12px; font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; background: rgba(14, 22, 36, 0.7); }
  .admin-block summary::-webkit-details-marker { display: none; }
  .admin-block-body { padding: 10px; }

  .mini-row { display: grid; grid-template-columns: 1fr auto; gap: 8px; margin-bottom: 8px; }
  .mini-list-item { display: grid; grid-template-columns: 1fr auto auto; gap: 6px; margin-bottom: 6px; }
  .mini-list-item input { width: 100%; }
  .mini-btn { background: linear-gradient(145deg, rgba(12,18,30,0.78), rgba(8,13,24,0.82)); border: 1px solid rgba(255,255,255,0.14); color: var(--text-dim); border-radius: 10px; padding: 7px 10px; font-size: 11px; cursor: pointer; transition: all 0.24s var(--ios-ease); }
  .mini-btn:hover { color: var(--accent); border-color: rgba(var(--theme-a), 0.55); transform: translateY(-1px); }

  .setup-state-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    width: 100%;
  }

  .tri-toggle {
    width: 58px;
    height: 26px;
    border-radius: 999px;
    border: 1px solid rgba(53, 81, 122, 0.85);
    background: rgba(10, 16, 28, 0.82);
    position: relative;
    cursor: pointer;
    transition: border-color 0.24s ease, background 0.24s ease, box-shadow 0.24s ease, transform 0.2s ease;
  }

  .tri-toggle::before {
    content: '';
    position: absolute;
    top: 3px;
    left: 3px;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #d8dfec;
    transition: transform 0.24s cubic-bezier(0.2, 0.7, 0.2, 1), background 0.24s ease, box-shadow 0.24s ease;
  }

  .tri-toggle[data-state='OFF'] { border-color: rgba(130, 140, 158, 0.65); }
  .tri-toggle[data-state='OFF']::before { transform: translateX(0); background: #aeb9cc; }

  .tri-toggle[data-state='N/A'] { border-color: rgba(255, 170, 78, 0.75); background: rgba(255, 170, 78, 0.1); }
  .tri-toggle[data-state='N/A']::before { transform: translateX(16px); background: #ffbe72; box-shadow: 0 0 10px rgba(255, 190, 114, 0.35); }

  .tri-toggle[data-state='ON'] { border-color: rgba(57, 244, 184, 0.75); background: rgba(57, 244, 184, 0.13); }
  .tri-toggle[data-state='ON']::before { transform: translateX(32px); background: #39f4b8; box-shadow: 0 0 12px rgba(57, 244, 184, 0.38); }

  .tri-toggle-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    min-width: 34px;
    text-align: right;
    transition: color 0.2s ease;
  }

  .tri-toggle-label.off { color: #b7c3d8; }
  .tri-toggle-label.na { color: #ffbe72; }
  .tri-toggle-label.on { color: #39f4b8; }

  .error-grid { display: grid; grid-template-columns: 180px 1fr; gap: 8px; }
  .error-list-admin { border: 1px solid var(--border); border-radius: 8px; max-height: 220px; overflow: auto; padding: 6px; }
  .error-item-admin { width: 100%; text-align: left; margin-bottom: 6px; background: transparent; border: 1px solid transparent; color: var(--text-dim); border-radius: 6px; padding: 7px 8px; cursor: pointer; font-size: 12px; }
  .error-item-admin.active { color: var(--accent); border-color: var(--accent-dim); background: rgba(57, 244, 184, 0.08); }

  @media (max-width: 980px) {
    .admin-shell { grid-template-columns: 1fr; }
    .error-grid { grid-template-columns: 1fr; }
  }

  .admin-help {
    margin-top: 10px;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: rgba(124, 240, 168, 0.04);
    color: var(--text-dim);
    font-size: 12px;
    line-height: 1.5;
  }

  .setup-toggles {
    display: none;
    grid-template-columns: repeat(3, minmax(185px, 1fr));
    gap: 12px;
    margin-top: 8px;
  }

  .setup-toggles.show { display: grid; }

  .setup-toggle {
    border: 1px solid var(--border);
    background: var(--bg);
    border-radius: 8px;
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    justify-content: center;
    gap: 10px;
    overflow: hidden;
    min-height: 86px;
  }

  .setup-toggle-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    min-height: 2.4em;
    display: flex;
    align-items: center;
    line-height: 1.25;
    white-space: normal;
    overflow-wrap: anywhere;
  }

  .setup-switch {
    position: relative;
    width: 42px;
    height: 24px;
    flex-shrink: 0;
  }

  .setup-switch input {
    opacity: 0;
    width: 0;
    height: 0;
    position: absolute;
  }

  .setup-slider {
    position: absolute;
    inset: 0;
    background: var(--border-strong);
    border-radius: 999px;
    cursor: pointer;
    transition: background 0.15s;
  }

  .setup-slider::before {
    content: '';
    position: absolute;
    width: 18px;
    height: 18px;
    left: 3px;
    top: 3px;
    background: #fff;
    border-radius: 50%;
    transition: transform 0.15s;
  }

  .setup-switch input:checked + .setup-slider {
    background: var(--accent-dim);
  }

  .setup-switch input:checked + .setup-slider::before {
    transform: translateX(18px);
  }

  .mob-topbar { display: none; }
  .mobile-toggle { display: none; }
  .sidebar-overlay {
    display: none;
    position: fixed; inset: 0; z-index: 1100;

    pointer-events: none;

  .sidebar-overlay.open { opacity: 1; pointer-events: auto; }

    .main { padding: 16px; max-width: 100%; }

    .setup-grid {

    .error-card { padding: 10px 12px; }

    .admin-shell { grid-template-columns: 1fr; }
    .error-grid { grid-template-columns: 1fr; }
    .setup-toggles { grid-template-columns: 1fr 1fr; gap: 8px; }
    .setup-toggle { padding: 8px 10px; min-height: 72px; gap: 8px; }

  @media (max-width: 480px) {
    .setup-cell {
      min-width: 100%;
      flex: 1 1 100%;
    }
    .setup-toggles { grid-template-columns: 1fr; }
    h1 { font-size: 19px; }
    .main { padding: 10px; }

  @media print {
    .sidebar, .product-logo, .hidden-access, .admin-fab, .copy-btn, .copy-all, .variant-pills, .toast { display: none !important; }
    .app { grid-template-columns: 1fr; }

  /* Fade-in on product change */
  .product-view {
    animation: fade 0.25s ease-out;
  }

  .product-view .section {

    from { opacity: 0; transform: translateY(6px); }

  }
  @keyframes fade {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

const STORAGE_KEY = 'cosmo_support_data_v1';
const DEFAULT_PRODUCTS = JSON.parse(JSON.stringify(products));
const DEFAULT_GENERAL_PAGES = JSON.parse(JSON.stringify(generalPages));

function loadStoredData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const parsed = JSON.parse(raw);
    if (Array.isArray(parsed.products)) {
      products.length = 0;
      parsed.products.forEach(p => products.push(p));
    }
    // Migrate: add variants to all products if missing from stored data
    products.forEach(p => {
      if (p.variants) return;
      const fresh = DEFAULT_PRODUCTS.find(d => d.key === p.key);
      if (fresh && fresh.variants) {
        p.variants = JSON.parse(JSON.stringify(fresh.variants));
        p.selectedVariant = null;
      }
    });
    if (parsed.generalPages && typeof parsed.generalPages === 'object') {
      Object.keys(generalPages).forEach(k => delete generalPages[k]);
      Object.keys(parsed.generalPages).forEach(k => {
        generalPages[k] = parsed.generalPages[k];
      });
    }
  } catch (err) {
    console.error('Failed to load saved data', err);
  }
}

function persistData() {
  const snapshot = {
    products: products,
    generalPages: generalPages,
    updatedAt: new Date().toISOString()
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(snapshot));
}

const API_BASE = '/api/data';

async function syncFromApi() {
  try {
    const res = await fetch(API_BASE);
    const json = await res.json();
    if (json.ok && json.data && Array.isArray(json.data.products)) {
      const remote = json.data.products;
      const merged = remote.map(rp => {
        const local = products.find(p => p.key === rp.key);
        return local ? mergeProductData(local, rp) : rp;
      });
      const remoteKeys = new Set(remote.map(p => p.key));
      products.filter(p => !remoteKeys.has(p.key)).forEach(p => merged.push(p));
      products.length = 0;
      merged.forEach(p => products.push(p));
      if (json.data.generalPages) {
        Object.keys(json.data.generalPages).forEach(k => { generalPages[k] = json.data.generalPages[k]; });
      }
      persistData();
      return true;
    }
  } catch {}
  return false;
}

function mergeProductData(local, remote) {
  const merged = { ...remote, variants: remote.variants ? { ...remote.variants } : undefined };
  if (local.variants && merged.variants) {
    Object.keys(local.variants).forEach(k => {
      if (!merged.variants[k]) merged.variants[k] = local.variants[k];
    });
  }
  return merged;
}

async function syncToApi(adminKey) {
  try {
    const snapshot = {
      products: products.map(p => {
        const clean = { ...p };
        delete clean.selectedVariant;
        return clean;
      }),
      generalPages: generalPages
    };
    const res = await fetch(API_BASE, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-admin-key': adminKey || '' },
      body: JSON.stringify(snapshot)
    });
    const json = await res.json();
    return json.ok;
  } catch { return false; }
}

function classifyValue(val) {
  const v = val.toUpperCase();
  if (v === 'ON' || v === 'ENABLED') return 'on';
  if (v === 'OFF' || v === 'DISABLED') return 'off';
  if (v === 'N/A') return 'na';
  if (v.includes('ON') && v.includes('OFF')) return 'warn';
  if (v.includes('ON') || v.includes('ENABLED')) return 'warn';
  if (v === 'DEFAULT') return 'na';
  return 'warn';
}

const COPY_ICON = `<svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;

function escapeAttr(s) {
  return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function stripHtml(html) {
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  return (tmp.textContent || tmp.innerText || '').trim();
}

function renderProduct(p, variantKey) {
  const data = getEffectiveData(p, variantKey);

  const variantPillsHtml = p.variants ? (() => {
    const order = getSortedVariantKeys(p);
    const activeKey = variantKey || getActiveVariantKey(p);
    return `<div class="variant-pills">${order.map(k => `<button class="variant-pill ${k === activeKey ? 'active' : ''}" data-variant="${k}">${escapeAttr(p.variants[k].name)}</button>`).join('')}</div>`;
  })() : '';

  const setupHtml = setupKeys.map(({ k, label }) => {
    const val = data.setup[k];
    const cls = classifyValue(val);
    return `<div class="setup-cell" data-copy="${escapeAttr(label + ': ' + val)}">
      <div class="setup-label">${label}</div>
      <div class="setup-value ${cls}">${val}</div>
    </div>`;
  }).join('');

  const setupCopyAll = setupKeys.map(({ k, label }) => `${label}: ${data.setup[k]}`).join('\n');

  const windowsHtml = data.windows.map(w => `<li data-copy="${escapeAttr(w)}">${w}</li>`).join('');
  const reqHtml = data.requirements.map(r => `<li data-copy="${escapeAttr(r)}">${r}</li>`).join('');

  const errorsHtml = data.errors.length === 0 ? '' : `
    <div class="section">
      <div class="section-title">
        <h2>Fixable Errors</h2>
        <div class="rule"></div>
      </div>
      <div class="error-list">
        ${data.errors.map(e => `
          <div class="error-card">
            <div class="error-header">
              <div class="error-name">${e.name}</div>
              <button class="copy-btn" data-copy="${escapeAttr(stripHtml(e.fix))}">${COPY_ICON} Copy fix</button>
            </div>
            <div class="error-fix">${e.fix}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `;

  const noteHtml = p.note ? `<div class="note"><span class="tag">Note</span>${p.note}</div>` : '';

  return `
    <div class="product-view">
      <div class="page-header">
        <div class="breadcrumb">${p.category} <span class="sep">/</span> <span class="current">${p.name}</span></div>
        <h1>${p.name}</h1>
        ${variantPillsHtml}
        <div class="subtitle">Click any setting, requirement, command, or "Copy fix" button to copy.</div>
      </div>

      <div class="section">
        <div class="section-title">
          <h2>System Setup</h2>
          <div class="rule"></div>
          <button class="copy-all" data-copy="${escapeAttr(setupCopyAll)}">Copy all</button>
        </div>
        <div class="setup-grid">${setupHtml}</div>
      </div>

      <div class="section">
        <div class="section-title">
          <h2>Compatibility & Requirements</h2>
          <div class="rule"></div>
        </div>
        <div class="info-grid">
          <div class="info-card">
            <h3>Supported Windows</h3>
            <ul>${windowsHtml}</ul>
          </div>
          <div class="info-card">
            <h3>Other Requirements</h3>
            <ul>${reqHtml}</ul>
          </div>
        </div>
      </div>

      ${errorsHtml}
      ${noteHtml}
    </div>
  `;
}

            <div class="info-card"><div class="error-fix">${s.body}</div></div>

        `).join('')}

}

function getEffectiveData(p, variantKey) {
  if (!variantKey || !p.variants || !p.variants[variantKey]) return p;
  const v = p.variants[variantKey];
  const merged = {
    ...p,
    setup: { ...p.setup, ...(v.setup || {}) },
    windows: v.windows && v.windows.length ? v.windows : p.windows,
    requirements: v.requirements && v.requirements.length ? v.requirements : p.requirements,
    errors: v.errors && v.errors.length ? v.errors : p.errors
  };
  return merged;
}

function getSortedVariantKeys(p) {
  if (!p.variants) return [];
  return Object.keys(p.variants).sort((a, b) => p.variants[a].name.localeCompare(p.variants[b].name));
}

function getActiveVariantKey(p) {
  if (!p.variants) return null;
  const stored = p.selectedVariant;
  if (stored && p.variants[stored]) return stored;
  const sorted = getSortedVariantKeys(p);
  return sorted[0] || null;
}

function buildNav() {

  const sortedProducts = [...products].sort((a, b) => a.name.localeCompare(b.name));
  sortedProducts.forEach((p, i) => {
    const li = document.createElement('li');
    li.className = 'nav-item';
    li.dataset.key = p.key;
    li.setAttribute('role', 'button');
    li.setAttribute('tabindex', '0');
    li.innerHTML = `<span class="marker">${String(i + 1).padStart(2, '0')}</span><span>${p.name}</span>`;
    navList.appendChild(li);
  });
}

function initializeNavAccessibility() {
  document.querySelectorAll('.nav-item').forEach(el => {
    el.setAttribute('role', 'button');
    el.setAttribute('tabindex', '0');
  });
}

function getOrderedProductKeys(visibleOnly) {
  return Array.from(navList.querySelectorAll('.nav-item'))
    .filter(item => !visibleOnly || !item.classList.contains('hidden'))
    .map(item => item.dataset.key);
}

function getCurrentSelectedProductKey() {
  const active = navList.querySelector('.nav-item.active');
  return active ? active.dataset.key : null;
}

function goToRelativeProduct(step) {
  const keys = getOrderedProductKeys(true);
  const fallbackKeys = keys.length ? keys : getOrderedProductKeys(false);
  if (!fallbackKeys.length) return;

  const current = getCurrentSelectedProductKey();
  const currentIndex = fallbackKeys.indexOf(current);
  const safeIndex = currentIndex === -1 ? 0 : currentIndex;
  const nextIndex = (safeIndex + step + fallbackKeys.length) % fallbackKeys.length;
  selectProduct(fallbackKeys[nextIndex]);
}

function restoreInitialSelection() {
  const hashKey = window.location.hash.replace('#', '');
  const lastVariant = localStorage.getItem(LAST_VARIANT_KEY);
  const lastProduct = localStorage.getItem(LAST_PRODUCT_KEY);
  const initialKey = hashKey || lastProduct || products[0]?.key;
  if (initialKey) selectProduct(initialKey, hashKey ? (lastVariant || undefined) : undefined);
}

  sidebarOverlay.classList.toggle('open', sidebar.classList.contains('open'));
  document.body.style.overflow = sidebar.classList.contains('open') ? 'hidden' : '';
}

function selectProduct(key, variantKey) {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.key === key));
  const product = products.find(p => p.key === key);
  if (product) {
    if (product.variants) {
      const effectiveKey = variantKey || getActiveVariantKey(product);
      if (effectiveKey) product.selectedVariant = effectiveKey;
    }
    applyThemeByKey(product.key);
    updateProductLogo(product.key, product.name);
    content.innerHTML = renderProduct(product, product.selectedVariant);
    localStorage.setItem(LAST_PRODUCT_KEY, product.key);
    if (product.selectedVariant) localStorage.setItem(LAST_VARIANT_KEY, product.selectedVariant);
    history.replaceState(null, '', '#' + product.key);
    return;
  }
  if (generalPages[key]) {
    applyThemeByKey(key === 'extra-kane' ? 'kane' : 'naxo');
    updateProductLogo(key === 'extra-kane' ? 'kane' : 'naxo', generalPages[key].name);
    content.innerHTML = renderGeneralPage(generalPages[key]);
    localStorage.setItem(LAST_PRODUCT_KEY, key);
    history.replaceState(null, '', '#' + key);
  }
}

    tag === 'input' ||

    tag === 'select' ||
    (e.target && e.target.isContentEditable);

function createProductKey(name) {
  const base = String(name || '')
    .toLowerCase()
    .replace(/[^a-z0-9]+/g, '-')
    .replace(/^-+|-+$/g, '') || 'product';
  let key = base;
  let i = 2;
  while (products.some(p => p.key === key)) {
    key = `${base}-${i}`;
    i += 1;
  }
  return key;
}

function createVariantKey(name, variants) {
  const base = String(name || '')
    .toLowerCase()
    .replace(/[^a-z0-9]+/g, '') || 'game';
  let key = base;
  let i = 2;
  while (variants && variants[key]) {
    key = `${base}${i}`;
    i += 1;
  }
  return key;
}

function applyThemeByKey(key) {
  const t = productThemes[key] || defaultTheme;
  const root = document.documentElement;
  root.style.setProperty('--theme-a', t.a);
  root.style.setProperty('--theme-b', t.b);
  root.style.setProperty('--theme-c', t.c);
  root.style.setProperty('--theme-bg-start', t.bg[0]);
  root.style.setProperty('--theme-bg-mid', t.bg[1]);
  root.style.setProperty('--theme-bg-end', t.bg[2]);
  root.style.setProperty('--sidebar-top', t.side[0]);
  root.style.setProperty('--sidebar-bottom', t.side[1]);
}

function updateProductLogo(key, label) {
  const mark = productLogoMarks[key] || (label ? label.trim().charAt(0).toUpperCase() : '•');
  productLogoMark.textContent = mark;
  productLogoName.textContent = label || 'General';
  productLogo.style.opacity = '1';
  productLogo.style.transform = 'translateY(0)';
  if (mobBrand) mobBrand.textContent = label || 'Cosmo';
}

let adminSelectedProductKey = null;
let adminSelectedErrorIndex = -1;
let adminSelectedVariantKey = null;

function getSortedProducts() {
  return [...products].sort((a, b) => a.name.localeCompare(b.name));
}

function getAdminSelectedProduct() {
  const p = products.find(p => p.key === adminSelectedProductKey) || null;
  return p;
}

function getAdminVariantTarget() {
  const p = getAdminSelectedProduct();
  if (!p || !p.variants) return { product: p, data: p, isVariant: false, variantKey: null };
  const vk = adminSelectedVariantKey && p.variants[adminSelectedVariantKey] ? adminSelectedVariantKey : Object.keys(p.variants)[0] || null;
  if (vk) adminSelectedVariantKey = vk;
  return { product: p, data: p.variants[vk] || p, isVariant: true, variantKey: vk || null };
}

function setAdminSelectedProduct(key, preserveVariant) {
  if (!products.some(p => p.key === key)) return;
  adminSelectedProductKey = key;
  if (!preserveVariant) adminSelectedVariantKey = null;
  renderAdminProductSelect();
  renderAdminVariantSelect();
  renderVisualSetupToggles();
  renderVisualListEditor();
  renderVisualErrorEditor();
}

function renderAdminProductSelect() {
  const list = getSortedProducts().map(p => `<option value="${p.key}">${p.name}</option>`).join('');
  adminProductSelect.innerHTML = list;
  if (adminSelectedProductKey) adminProductSelect.value = adminSelectedProductKey;
  const selected = getAdminSelectedProduct();
  adminProductNameInline.value = selected ? selected.name : '';
  renderAdminVariantSelect();
}

function renderAdminVariantSelect() {
  const p = getAdminSelectedProduct();
  if (!p || !p.variants) {
    adminVariantWrap.style.display = 'none';
    adminSelectedVariantKey = null;
    return;
  }
  adminVariantWrap.style.display = 'block';
  const allKeys = getSortedVariantKeys(p);
  if (!adminSelectedVariantKey || !p.variants[adminSelectedVariantKey]) {
    adminSelectedVariantKey = allKeys[0] || null;
  }
  adminVariantSelect.innerHTML = allKeys.map(k => `<option value="${k}">${escapeAttr(p.variants[k].name)}</option>`).join('');
  if (adminSelectedVariantKey) adminVariantSelect.value = adminSelectedVariantKey;
  adminVariantNameInline.value = adminSelectedVariantKey && p.variants[adminSelectedVariantKey] ? p.variants[adminSelectedVariantKey].name : '';
}

function renderVisualSetupToggles() {
  const { product: p, data: target, isVariant } = getAdminVariantTarget();
  if (!p) return;
  const setupObj = target.setup || {};
  setupTogglesVisual.innerHTML = setupKeys.map(({ k, label }) => {
    const raw = String(setupObj[k] || (isVariant ? '' : '')).toUpperCase();
    const effective = raw || (p.setup ? String(p.setup[k] || '').toUpperCase() : '');
    const state = effective === 'ON' || effective === 'ENABLED' ? 'on' : (effective === 'N/A' || effective === 'DEFAULT' ? 'na' : (raw ? 'off' : 'off'));
    const display = raw || effective || 'OFF';
    return `<div class="setup-toggle"><span class="setup-toggle-label">${label}</span><div class="setup-state-row" data-visual-setup="${k}"${isVariant ? ` data-variant-setup="${k}"` : ''}><button class="tri-toggle" data-state="${display}" aria-label="Toggle ${label} state"></button><span class="tri-toggle-label ${state}">${display}</span></div></div>`;
  }).join('');
}

function renderVisualListEditor() {
  const { product: p, data: target, isVariant } = getAdminVariantTarget();
  if (!p) return;
  const win = (target.windows && target.windows.length) ? target.windows : p.windows;
  const req = (target.requirements && target.requirements.length) ? target.requirements : p.requirements;
  adminWindowsList.innerHTML = win.map((item, i) => `<div class="mini-list-item"><input data-win-input="${i}" value="${escapeAttr(item)}"><button class="mini-btn" data-win-save="${i}">Save</button><button class="mini-btn" data-win-del="${i}">Del</button></div>`).join('');
  adminReqList.innerHTML = req.map((item, i) => `<div class="mini-list-item"><input data-req-input="${i}" value="${escapeAttr(item)}"><button class="mini-btn" data-req-save="${i}">Save</button><button class="mini-btn" data-req-del="${i}">Del</button></div>`).join('');
}

function splitFixAndLink(html) {
  const linkMatch = String(html).match(/<a[^>]*href="([^"]+)"[^>]*>/i);
  const link = linkMatch ? linkMatch[1] : '';
  const text = String(html).replace(/<a[^>]*>.*?<\/a>/gis, '').trim();
  return { text, link };
}

function renderVisualErrorEditor() {
  const { product: p, data: target, isVariant } = getAdminVariantTarget();
  if (!p) return;
  if (!Array.isArray(target.errors)) target.errors = [];
  if (isVariant && target.errors.length === 0 && Array.isArray(p.errors) && p.errors.length) {
    target.errors = p.errors.map(e => ({ name: e.name, fix: e.fix }));
  }
  const errArr = target.errors || [];
  if (errArr.length === 0) {
    adminSelectedErrorIndex = -1;
    adminErrorTitle.value = '';
    adminErrorFix.value = '';
    adminErrorLink.value = '';
  } else if (adminSelectedErrorIndex < 0 || adminSelectedErrorIndex >= errArr.length) {
    adminSelectedErrorIndex = 0;
  }

  adminErrorList.innerHTML = errArr.map((e, i) => `<button class="error-item-admin ${i === adminSelectedErrorIndex ? 'active' : ''}" data-error-pick="${i}">${escapeAttr(e.name)}</button>`).join('');

  if (adminSelectedErrorIndex >= 0 && errArr[adminSelectedErrorIndex]) {
    const current = errArr[adminSelectedErrorIndex];
    const parts = splitFixAndLink(current.fix || '');
    adminErrorTitle.value = current.name || '';
    adminErrorFix.value = parts.text || '';
    adminErrorLink.value = parts.link || '';
  }

  const eff = getEffectiveData(p, adminSelectedVariantKey || undefined);
  adminPreviewVisual.textContent = JSON.stringify({
    product: p.name,
    variant: adminSelectedVariantKey || null,
    setup: eff.setup,
    windows: eff.windows,
    requirements: eff.requirements,
    errors: eff.errors
  }, null, 2);
}

function saveAndRefreshAdmin(productKeyToSelect, variantKey) {
  persistData();
  const targetKey = productKeyToSelect || adminSelectedProductKey;
  if (variantKey) adminSelectedVariantKey = variantKey;
  const p = targetKey ? products.find(pr => pr.key === targetKey) : null;
  if (p && p.variants && adminSelectedVariantKey) {
    p.selectedVariant = adminSelectedVariantKey;
  }
  buildNav();
  initializeNavAccessibility();
  const pick = targetKey || 'naxo';
  adminSelectedProductKey = pick;
  renderAdminProductSelect();
  renderAdminVariantSelect();
  renderVisualSetupToggles();
  renderVisualListEditor();
  renderVisualErrorEditor();
  selectProduct(pick, adminSelectedVariantKey || undefined);
  if (updateAccessGranted) syncToApi(ACCESS_PROMPT_ANSWER).catch(() => {});
}



function openAdminPanel() {
  if (!updateAccessGranted) return;
  const currentKey = getCurrentSelectedProductKey();
  if (currentKey && products.some(p => p.key === currentKey)) {
    adminSelectedProductKey = currentKey;
    const p = products.find(pr => pr.key === currentKey);
    if (p && p.variants && p.selectedVariant) {
      adminSelectedVariantKey = p.selectedVariant;
    } else {
      adminSelectedVariantKey = null;
    }
  } else if (!adminSelectedProductKey && products[0]) {
    adminSelectedProductKey = products[0].key;
  }
  adminModal.classList.add('show');
  adminModal.setAttribute('aria-hidden', 'false');
  if (adminSelectedProductKey) {
    setAdminSelectedProduct(adminSelectedProductKey, true);
  } else {
    renderAdminProductSelect();
  }
}

adminDeleteVariantInline.addEventListener('click', () => {
  const p = getAdminSelectedProduct();
  if (!p || !p.variants || !adminSelectedVariantKey || !p.variants[adminSelectedVariantKey]) return;
  const count = Object.keys(p.variants).length;
  if (count <= 1) {
    showToast('✕ Keep at least one game');
    return;
  }
  const label = p.variants[adminSelectedVariantKey].name;
  if (!window.confirm(`Delete game "${label}"?`)) return;
  delete p.variants[adminSelectedVariantKey];
  const nextKey = Object.keys(p.variants)[0] || null;
  adminSelectedVariantKey = nextKey;
  saveAndRefreshAdmin(p.key, nextKey || undefined);
});

function exportData() {
  const snapshot = {
    products: products,
    generalPages: generalPages,
    updatedAt: new Date().toISOString()
  };
  const blob = new Blob([JSON.stringify(snapshot, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'cosmo-support-data.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('✓ Exported');
}

adminExportVisual.addEventListener('click', exportData);
adminImportVisual.addEventListener('click', () => {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'application/json';
  input.onchange = async e => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      const text = await file.text();
      const parsed = JSON.parse(text);
      if (!Array.isArray(parsed.products) || !parsed.generalPages) {
        showToast('✕ Invalid JSON format');
        return;
      }
      products.length = 0;
      parsed.products.forEach(p => products.push(p));
      Object.keys(generalPages).forEach(k => delete generalPages[k]);
      Object.keys(parsed.generalPages).forEach(k => {
        generalPages[k] = parsed.generalPages[k];
      });
      persistData();
      buildNav();
      initializeNavAccessibility();
      selectProduct(products[0] ? products[0].key : 'naxo');
      adminSelectedProductKey = products[0] ? products[0].key : null;
      if (adminSelectedProductKey) setAdminSelectedProduct(adminSelectedProductKey);
      showToast('✓ Imported');
    } catch (err) {
      showToast('✕ Import failed');
    }
  };
  input.click();
});
adminSyncBtn.addEventListener('click', async () => {
  if (!updateAccessGranted) { showToast('✕ Access denied'); return; }
  adminSyncBtn.disabled = true;
  adminSyncBtn.textContent = 'Syncing...';
  const ok = await syncToApi(ACCESS_PROMPT_ANSWER);
  adminSyncBtn.disabled = false;
  adminSyncBtn.textContent = 'Sync to all users';
  showToast(ok ? '✓ Synced to all users' : '✕ Sync failed');
});

adminResetVisual.addEventListener('click', () => {
  products.length = 0;
  DEFAULT_PRODUCTS.forEach(p => products.push(JSON.parse(JSON.stringify(p))));
  Object.keys(generalPages).forEach(k => delete generalPages[k]);
  Object.keys(DEFAULT_GENERAL_PAGES).forEach(k => {
    generalPages[k] = JSON.parse(JSON.stringify(DEFAULT_GENERAL_PAGES[k]));
  });
  persistData();
  buildNav();
  initializeNavAccessibility();
  selectProduct('naxo');
  adminSelectedProductKey = 'naxo';
  setAdminSelectedProduct('naxo');
  showToast('✓ Reset to default');
});

adminSelectedProductKey = products.some(p => p.key === initialKey) ? initialKey : (products[0] ? products[0].key : null);
if (adminSelectedProductKey) setAdminSelectedProduct(adminSelectedProductKey);

/* =========================================================
   COPY-TO-CLIPBOARD
   ========================================================= */
const toast = document.getElementById('toast');
let toastTimer;

function showToast(message = '✓ Copied to clipboard') {
  toast.textContent = message;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 1500);
}

async function copyText(text) {
  try {
    await navigator.clipboard.writeText(text);
    return true;
  } catch (err) {
    // Fallback for older browsers / non-secure contexts
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try {
      document.execCommand('copy');
      document.body.removeChild(ta);
      return true;
    } catch (e) {
      document.body.removeChild(ta);
      return false;
    }
  }
}

function flashCopied(el) {
  el.classList.add('copied');
  setTimeout(() => el.classList.remove('copied'), 1200);
}

// Global click handler — copies anything with data-copy, plus <code> tags and links
document.addEventListener('click', async (e) => {
  // Don't intercept actual links — let them open
  if (e.target.tagName === 'A' && e.target.href) return;

  // 1. Anything with data-copy attribute
  const copyTarget = e.target.closest('[data-copy]');
  if (copyTarget) {
    e.preventDefault();
    const text = copyTarget.getAttribute('data-copy');
    const ok = await copyText(text);
    if (ok) {
      flashCopied(copyTarget);
      // Update copy button label briefly
      if (copyTarget.classList.contains('copy-btn')) {
        const original = copyTarget.innerHTML;
        copyTarget.innerHTML = `${COPY_ICON} Copied`;
        setTimeout(() => { copyTarget.innerHTML = original; }, 1200);
      }
      showToast();
    } else {
      showToast('✕ Copy failed');
    }
    return;
  }

  // 2. Inline code tags inside .error-fix
  if (e.target.tagName === 'CODE' && e.target.closest('.error-fix')) {
    const text = e.target.textContent;
    const ok = await copyText(text);
    if (ok) {
      flashCopied(e.target);
      showToast('✓ Command copied');
    } else {
      showToast('✕ Copy failed');
    }
  }
});
</script>
